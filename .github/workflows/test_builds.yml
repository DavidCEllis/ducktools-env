name: Test Builds

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]


jobs:
  exe-build:
    name: Test exe Build
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    - name: Install the module
      run: |
        python -m pip install --upgrade pip
        python -m pip install . --group build
    - name: Build the zipapp
      run: |
        python -m ducktools.env rebuild_env --zipapp
    - name: Store the built zipapp
      uses: actions/upload-artifact@v7
      with:
        name: ducktools-zipapp
        path: dist/
        retention-days: 1

  wheel-build:
    name: Test Wheel Build
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    - name: Install pypa/build
      run: >-
        python3 -m
        pip install
        build
        --user
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v7
      with:
        name: python-package-distributions
        path: dist/
        retention-days: 1